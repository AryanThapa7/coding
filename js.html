<!DOCTYPE html>
<html>
<head>
    <title>Hover Image Change</title>
</head>
<body>

<img id="myImage" 
     src="DWITCollege.png" 
     width="300">

<script>
const img = document.getElementById("myImage");

img.addEventListener("mouseenter", () => {
    img.src = "Unknown.jpeg";
});

img.addEventListener("mouseleave", () => {
    img.src = "DWITCollege.png";
});
</script>

</body>
</html>
